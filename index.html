<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>NanaObasty Marketplace</h1>
        <button id="loginBtn">Login / Sign Up</button>
        <button id="sellBtn">Post an Ad</button>
    </nav>

    <main id="ad-grid">
        <p>Loading amazing deals...</p>
    </main>

    <script src="app.js">
        <div id="postAdModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2>Post Your Item</h2>
        <form id="postAdForm">
            <input type="text" id="title" placeholder="What are you selling?" required>
            <input type="number" id="price" placeholder="Price (GH₵)" required>
            <select id="category">
                <option value="Electronics">Electronics</option>
                <option value="Vehicles">Vehicles</option>
                <option value="Property">Property</option>
                <option value="Fashion">Fashion</option>
            </select>
            <textarea id="description" placeholder="Describe your item..."></textarea>
            <input type="url" id="image_url" placeholder="Image URL (Link to a photo)">
            <button type="submit" id="submitBtn">Post Ad Now</button>
        </form>
    </div>
</div>
    </script>
    
</body>
</html>
